actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No API transport surface of any kind (REST, GraphQL, WebSocket) is
    documented for Pawfinity, so no AsyncAPI document was created and the
    apis.yml apis array is left empty rather than populated with fabricated
    endpoints.
